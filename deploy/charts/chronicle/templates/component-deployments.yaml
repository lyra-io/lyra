{{- if .Values.xunit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle-xunit
  labels:
    app.kubernetes.io/name: chronicle-xunit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.xunit.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chronicle-xunit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronicle-xunit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: xunit
          image: "{{ .Values.xunit.image.repository }}:{{ .Values.xunit.image.tag }}"
          imagePullPolicy: {{ .Values.xunit.image.pullPolicy }}
          command: ["chronicle"]
          args: ["xunit", "start", "--config", "/etc/chronicle/chronicled.toml"]
          volumeMounts:
            - name: config
              mountPath: /etc/chronicle
          resources:
            {{- toYaml .Values.xunit.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: chronicle-config
{{- end }}
{{- if .Values.sink.enabled }}
