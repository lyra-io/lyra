{{- if .Values.lens.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle-lens
  labels:
    app.kubernetes.io/name: chronicle-lens
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.lens.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chronicle-lens
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronicle-lens
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: lens
          image: "{{ .Values.lens.image.repository }}:{{ .Values.lens.image.tag }}"
          imagePullPolicy: {{ .Values.lens.image.pullPolicy }}
          command: ["chronicle"]
          args: ["lens", "start", "--config", "/etc/chronicle/chronicled.toml"]
          ports:
            - containerPort: 50051
              name: flight-sql
          volumeMounts:
            - name: config
              mountPath: /etc/chronicle
          resources:
            {{- toYaml .Values.lens.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: chronicle-config
{{- end }}
